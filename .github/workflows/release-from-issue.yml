name: Release from issue

# Triggered when someone opens (or labels) an issue with the `release`
# label — typically via the "Release" issue template at
# `.github/ISSUE_TEMPLATE/release.yml`. Discovers the current set of
# instrumented test classes, hydrates the issue body's UI_TESTS section
# with `- [ ] <FQN>` checkboxes, validates the tag from the issue body,
# and dispatches the Release workflow with `tag` + `issue_number` so the
# Release run can tick boxes / post failure comments back here.
#
# Re-running for the same issue is safe: hydrate is idempotent (rewrites
# the section between `<!-- UI_TESTS_START -->` and `<!-- UI_TESTS_END -->`
# in full each time).

on:
  issues:
    # `labeled` only — NOT `opened` or `edited`. GitHub fires `labeled`
    # for both template-auto-applied labels (at creation) and labels
    # added later, so this catches every release-issue path with a
    # single fire. Listening on `opened` would double-fire when the
    # template auto-applies `release`. Listening on `edited` would re-
    # dispatch every time the issue body changes (incl. when this same
    # workflow hydrates the UI_TESTS section).
    types: [labeled]

permissions:
  contents: read    # checkout
  issues: write     # edit body, post comments
  actions: write    # dispatch the Release workflow

jobs:
  hydrate-and-dispatch:
    name: Hydrate checklist + dispatch Release
    # Restrict to the specific label that was just added — without this,
    # any other label change on a release-tagged issue would re-trigger.
    if: github.event.label.name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        # No `lfs: true` — this job runs python3 over text only.
        # Auto-bump queries tags via `git ls-remote --tags origin`
        # below, so we don't rely on this checkout having fetched
        # tags locally. (The pinned SHA above is checkout v4.0.0,
        # which predates the `fetch-tags` input — that input was
        # added in v4.1.0 and is silently ignored here. Querying the
        # remote sidesteps the version coupling entirely.)

      - name: Discover instrumented test classes
        id: discover
        run: |
          python3 scripts/release_issue.py discover > /tmp/tests.txt
          echo "Discovered $(wc -l < /tmp/tests.txt) test classes:"
          cat /tmp/tests.txt

      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          # Read the issue body fresh — `github.event.issue.body` is the
          # snapshot at trigger time, which may be stale by a few seconds.
          BODY=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} --json body --jq .body)
          # `parse-tag` returns "" when the field is blank or holds the
          # GitHub "_No response_" placeholder; it still aborts on a
          # malformed value (e.g. `0.0.8` without the `v`).
          TAG=$(printf '%s' "$BODY" | python3 scripts/release_issue.py parse-tag)

          if [ -z "$TAG" ]; then
            # Query origin for v-tags via `git ls-remote` instead of
            # the local `git tag` list. The pinned `actions/checkout`
            # SHA is v4.0.0, which predates the `fetch-tags: true`
            # input — it's silently ignored, so the local tag list
            # is empty and `git tag` would always fall through to
            # the v0.0.1 baseline (issue #128). `ls-remote` is also
            # a fresher source-of-truth than locally-fetched refs.
            #
            # `--refs` strips the peeled `^{}` entries; `sort -V`
            # is version-aware so v0.0.10 sorts after v0.0.9.
            LATEST=$(git ls-remote --tags --refs origin \
                       | awk '{print $2}' \
                       | sed 's|refs/tags/||' \
                       | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                       | sort -V \
                       | tail -1)
            if [ -z "$LATEST" ]; then
              # First-ever release on a fresh repo — start at v0.0.1.
              TAG="v0.0.1"
              echo "::notice::No existing v* tags on origin; defaulting to $TAG"
            else
              # Here-string (`<<<`) avoids a multi-line heredoc
              # whose `EOF` terminator at column 0 would break YAML's
              # `run: |` block scalar — same fix landed in onym-ios.
              IFS='.' read -r MAJOR MINOR PATCH <<<"${LATEST#v}"
              TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              echo "::notice::Tag field blank; auto-bumping ${LATEST} → ${TAG}"
            fi
            echo "auto_bumped=1" >> "$GITHUB_OUTPUT"
          else
            echo "auto_bumped=0" >> "$GITHUB_OUTPUT"
          fi

          # Refuse to dispatch on a tag that already exists on origin.
          # `git rev-parse` would only see locally-fetched tags and
          # could falsely green-light a collision in this checkout
          # configuration; query the remote via `ls-remote --exit-code`
          # instead. The auto-bump path is collision-free by
          # construction; this only catches a hand-typed tag.
          if git ls-remote --tags --refs --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' already exists on origin"
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "❌ Tag \`$TAG\` already exists on the repo. Pick a higher patch version or leave the Release tag field blank to auto-bump."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Hydrate UI_TESTS + Tag sections in issue body
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          AUTO_BUMPED: ${{ steps.tag.outputs.auto_bumped }}
        run: |
          set -eu
          BODY=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} --json body --jq .body)
          # `--tag` rewrites the `### Release tag` value to the resolved
          # tag; idempotent for the explicit case, meaningful for the
          # auto-bumped case so the issue itself shows what got
          # dispatched.
          NEW_BODY=$(printf '%s' "$BODY" | python3 scripts/release_issue.py hydrate \
            --tests /tmp/tests.txt \
            --tag "$TAG")
          # Idempotent: if the section is already populated with the
          # same FQNs and the tag matches, the diff is a no-op. `gh
          # issue edit` skips the API write when nothing changed.
          printf '%s' "$NEW_BODY" | gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} --body-file -

          if [ "$AUTO_BUMPED" = "1" ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "ℹ️ Release tag was blank — auto-bumped to \`${TAG}\` (next patch after the latest \`v*\` tag). Edit the issue and re-open if you want a different version."
          fi

      - name: Dispatch Release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run Release \
            --repo ${{ github.repository }} \
            -f tag=${{ steps.tag.outputs.tag }} \
            -f issue_number=${{ github.event.issue.number }}
          echo "Dispatched Release for tag ${{ steps.tag.outputs.tag }}, issue #${{ github.event.issue.number }}"

      - name: Confirm dispatch on the issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # One-line acknowledgement so the issue author knows the
          # automation kicked in. Includes a link to the Actions page —
          # the brand-new run isn't easily linkable until it appears in
          # the dispatched workflow's run list.
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Dispatched [Release workflow](https://github.com/${{ github.repository }}/actions/workflows/release.yml) for tag \`${{ steps.tag.outputs.tag }}\`. UI test results will land here as the run completes."
