name: Release

# Cuts an onym-android release: lint + JVM unit tests + UI
# instrumented tests on an emulator → create GitHub Release at
# the tag → assembleRelease → zipalign + apksigner → upload
# signed universal APK to the GitHub Release.
#
# APK is the only artifact: no AAB, no Play Store, no F-Droid. Single
# universal APK with all four ABIs (arm64-v8a, armeabi-v7a, x86_64,
# x86) bundled, ~50-70 MB.
#
# Trigger:
#   gh workflow run Release -f tag=v0.0.1
#
# Required repo secrets (see keystore/README.md for setup):
#   ANDROID_KEYSTORE_BASE64    — base64-encoded JKS keystore
#   ANDROID_KEYSTORE_PASSWORD  — keystore password
#   ANDROID_KEY_ALIAS          — alias inside the keystore
#   ANDROID_KEY_PASSWORD       — password for that alias
#   RELAYER_AUTH_TOKEN         — Bearer token the relayer's
#                                 `validate_auth` requires on every
#                                 contract-call POST. Two consumers:
#                                 (1) `android-test` job — passed as
#                                 the `ONYM_RELAYER_AUTH_TOKEN`
#                                 instrumentation arg so
#                                 `CreateGroupTyrannyE2ETest` can
#                                 anchor a real group on testnet
#                                 against the deployed relayer.
#                                 (2) `build` job — inlined into
#                                 `BuildConfig.RELAYER_AUTH_TOKEN` at
#                                 assembleRelease and consumed at
#                                 runtime by `BearerAuthInterceptor`.
#                                 Without this secret, the E2E test
#                                 401s and the release APK ships with
#                                 a blank token (the interceptor
#                                 skips the header on blank rather
#                                 than sending `Bearer ""`).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.1)'
        required: true
        type: string
      issue_number:
        # Set by `release-from-issue.yml` when the workflow is dispatched
        # from a release-tracking issue. The `report-to-issue` job uses
        # this to tick UI_TESTS checkboxes + post failure comments back
        # into the issue. Empty when dispatched manually via
        # `gh workflow run Release -f tag=...`.
        description: 'Optional release-issue number to report results into'
        required: false
        type: string
        default: ''

permissions:
  contents: write   # tag push + GitHub Release creation + asset upload
  issues: write     # report-to-issue job edits body + posts comments

jobs:
  # ─── Hard gates ──────────────────────────────────────────────────
  # All three run in parallel. `build` waits on all of them via
  # `needs:` so a failure in any prevents an APK from ever being
  # built or uploaded.

  lint:
    name: Lint (no off-repo secret reads + MissingTranslation)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Static check — identity secrets
        run: python3 scripts/lint-secrets.py

  test:
    name: JVM unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # Launcher icons (`ic_launcher_foreground.png`,
          # `ic_launcher_monochrome.png`) live in Git LFS — without
          # this AAPT2 sees the ~130-byte pointer text and `fail to
          # compile` blows up the build. Run #25272219941 surfaced it.
          lfs: true
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d  # v4
      - run: ./gradlew :app:testDebugUnitTest --no-daemon

  android-test:
    # Compose UI tests + instrumented IdentityRepository tests
    # against a real emulator. Combined wall time ~10-12 min cold
    # (~6 min for AVD boot + ~3 min for Gradle + ~2 min for the
    # test suites themselves). AVD snapshot is cached between runs
    # via reactivecircus/android-emulator-runner so warm runs are
    # noticeably faster.
    name: UI + instrumented tests on emulator
    runs-on: ubuntu-latest
    # KVM acceleration is required for tolerable emulator boot
    # times — ubuntu-latest GitHub runners ship /dev/kvm enabled,
    # but the udev rule needs broadening so the runner user can
    # use it. Standard recipe from the action's README.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # AAPT2 needs the real launcher PNGs (Git LFS), not the
          # pointer text. Same reason as the JVM-tests job above.
          lfs: true

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d  # v4

      # AVD snapshot cache key includes the API level + system image
      # type so a future bump to a different API invalidates cleanly.
      - name: Cache AVD snapshot
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-34-google-apis-x86_64

      - name: Create AVD + warm snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@70f4dee990796918b78d040e3278474bdbd348a7  # v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD warm snapshot created"

      - name: Run instrumented tests on emulator
        # Runs the offline Compose UI + instrumented suite (loopback
        # harness — no network). The gated real-testnet E2E tests
        # (`CreateGroup*E2ETest`) are NOT opted in: the GitHub-hosted
        # emulator can't reach relayer.onym.chat, so `ONYM_INTEGRATION=1`
        # made them fail every run with connection timeouts. Without it
        # their @Before `Assume.assumeTrue` skips them cleanly (mirrors
        # onym-ios — run the E2E tests locally). ScreenshotTest is
        # excluded too: it's a screengrab flow covered by
        # `fastlane screenshots`, not a correctness gate.
        uses: reactivecircus/android-emulator-runner@70f4dee990796918b78d040e3278474bdbd348a7  # v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # One line on purpose: `reactivecircus/android-emulator-runner`
          # invokes the script via `sh -c <script>` without quoting,
          # so YAML-block backslash continuations (`\<newline>`) get
          # split into separate sh arguments and gradle sees a literal
          # `\` task name. Run #25262842752 failed exactly that way;
          # keep the gradle invocation single-line to dodge the issue.
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon -Pandroid.testInstrumentationRunnerArguments.notClass=app.onym.android.uitests.ScreenshotTest

      - name: Upload androidTest report
        # Always upload — the `report-to-issue` job needs to read the
        # JUnit XMLs even on a fully-green run so it can tick the
        # UI_TESTS checkboxes in the release-tracking issue. Was
        # `if: failure()` before the release-issue automation landed.
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: connectedAndroidTest-report
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/

  # ─── GitHub Release creation ─────────────────────────────────────

  create-release:
    name: Create GitHub Release at tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0   # need full history for the release-notes commit range

      - name: Validate tag input
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -eu
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag must look like vX.Y.Z (got: $TAG)" >&2
            exit 1
          fi
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists locally" >&2
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "tag $TAG already exists on origin" >&2
            exit 1
          fi

      - name: Generate release notes
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -eu
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}\$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          {
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --pretty=format:"- %s" --no-merges
            echo ""
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            fi
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release_notes.md

  # ─── APK build + sign + upload ───────────────────────────────────

  build:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, test, android-test, create-release]
    # Share the lock with qa-build.yml so a tag-gated release and a
    # manual ad-hoc QA dispatch don't race on /qa/builds.json. Only
    # the build job (where the QA publish runs) takes the lock; lint
    # and tests still run in parallel.
    concurrency:
      group: qa-build-android
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # `assembleRelease` runs AAPT2 over `app/src/main/res/`,
          # which includes LFS-tracked launcher PNGs. Without `lfs:
          # true` the binary content is missing and AAPT2 fails with
          # "file failed to compile" on the pointer text.
          lfs: true
          # Full history + tags so `resolveReleaseVersion()` in
          # `app/build.gradle.kts` can fall back to `git describe` if
          # the explicit `RELEASE_VERSION` env below isn't honoured
          # for some reason. Belt + braces — the env is the canonical
          # path; this just keeps a working fallback rather than
          # silently shipping `0.0.0-dev`.
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d  # v4

      - name: assembleRelease
        # Produces app/build/outputs/apk/release/app-release-unsigned.apk
        # (no signingConfig is declared on the release buildType, so
        # AGP emits an unsigned APK rather than failing the build).
        #
        # RELEASE_VERSION pipes the dispatch tag straight into
        # `resolveReleaseVersion()` in `app/build.gradle.kts`, which
        # surfaces it as `BuildConfig.VERSION_NAME` (the About screen
        # reads this directly). Single source of truth = the tag.
        #
        # RELAYER_AUTH_TOKEN is consumed by `relayerAuthToken()` in
        # `app/build.gradle.kts` and inlined into BuildConfig at
        # compile time; runtime `BearerAuthInterceptor` reads it from
        # `BuildConfig.RELAYER_AUTH_TOKEN`. Required new repo secret
        # — without it, release builds compile and ship but every
        # relayer call 401s with "missing bearer".
        env:
          RELEASE_VERSION: ${{ inputs.tag }}
          RELAYER_AUTH_TOKEN: ${{ secrets.RELAYER_AUTH_TOKEN }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Locate + rename APK
        id: apk
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -eu
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          [ -f "$UNSIGNED" ] || {
            echo "expected unsigned APK at $UNSIGNED" >&2
            ls -la app/build/outputs/apk/release/ 2>&1 >&2 || true
            exit 1
          }
          VERSION="${TAG#v}"
          OUT="onym-android-${VERSION}.apk"
          mv "$UNSIGNED" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Zipalign APK
        # zipalign aligns uncompressed entries to 4-byte boundaries
        # (the Android runtime mmap's resources directly off the APK).
        # `-p` page-aligns shared libraries to 16 KB pages — required
        # by Android 15+ on devices with 16 KB page sizes.
        run: |
          set -eu
          ZIPALIGN=$(find "$ANDROID_HOME" -name zipalign 2>/dev/null | sort -V | tail -1)
          [ -x "$ZIPALIGN" ] || { echo "zipalign not found in $ANDROID_HOME" >&2; exit 1; }
          mv "${{ steps.apk.outputs.path }}" unaligned.apk
          $ZIPALIGN -p -v 4 unaligned.apk "${{ steps.apk.outputs.path }}"
          rm unaligned.apk

      - name: Sign APK
        env:
          KEYSTORE_BASE64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eu
          [ -n "$KEYSTORE_BASE64" ]   || { echo "secret ANDROID_KEYSTORE_BASE64 unset"   >&2; exit 1; }
          [ -n "$KEYSTORE_PASSWORD" ] || { echo "secret ANDROID_KEYSTORE_PASSWORD unset" >&2; exit 1; }
          [ -n "$KEY_ALIAS" ]         || { echo "secret ANDROID_KEY_ALIAS unset"         >&2; exit 1; }
          [ -n "$KEY_PASSWORD" ]      || { echo "secret ANDROID_KEY_PASSWORD unset"      >&2; exit 1; }

          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
          APKSIGNER=$(find "$ANDROID_HOME" -name apksigner 2>/dev/null | sort -V | tail -1)
          [ -x "$APKSIGNER" ] || { echo "apksigner not found in $ANDROID_HOME" >&2; exit 1; }

          $APKSIGNER sign \
            --ks /tmp/keystore.jks \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            "${{ steps.apk.outputs.path }}"
          rm /tmp/keystore.jks

          # Verify the produced signature so a misconfigured secret
          # surfaces as a build failure rather than a silently-broken
          # APK in the GitHub Release.
          $APKSIGNER verify --verbose "${{ steps.apk.outputs.path }}"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ steps.apk.outputs.path }}

      # ----------------------------------------------------------------
      # Publish the same signed APK to onym.app/qa/. Mirror of
      # `qa-build.yml`'s publish chain — kept inline (rather than
      # extracted into a composite action) so the manual QA dispatch
      # and the tag-gated release stay readable side by side. iOS has
      # the equivalent in `release.yml` after the GitHub-Release upload.
      #
      # On a release run, the dashboard entry is `kind: tag` (the
      # manual dispatch path uses `kind: branch` + commit-decorated
      # version).
      # ----------------------------------------------------------------

      - name: Stage signed APK for QA dashboard
        env:
          VERSION: ${{ inputs.tag }}
          APK_PATH: ${{ steps.apk.outputs.path }}
        run: |
          set -eu
          [ -f "$APK_PATH" ] || { echo "expected signed APK at $APK_PATH" >&2; exit 1; }
          mkdir -p "dist/qa/android/${VERSION}"
          cp "$APK_PATH" "dist/qa/android/${VERSION}/onym.apk"
          echo "APK_SIZE=$(stat -c%s "dist/qa/android/${VERSION}/onym.apk")" >> "$GITHUB_ENV"

      - name: Build dashboard entry + merge into builds.json
        env:
          VERSION:    ${{ inputs.tag }}
          TAG:        ${{ inputs.tag }}
          COMMIT:     ${{ github.sha }}
          ISSUE:      ${{ inputs.issue_number }}
          REPO:       ${{ github.repository }}
          RUN_ID:     ${{ github.run_id }}
          HOST:       ${{ secrets.DEPLOY_HOST }}
          GH_TOKEN:   ${{ github.token }}
        run: |
          set -eu
          BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          COMMIT_SHORT=$(printf '%s' "$COMMIT" | cut -c1-5)

          # Resolve the originating release issue's title + body
          # (best-effort; gh failure -> empty strings). Issue number is
          # plumbed in by release-from-issue.yml; manual `gh workflow run
          # Release` dispatches without it leave the field null. `body`
          # powers the Test Plan section on the build details page
          # (public/qa/build/ in onym-website) without the page having
          # to hit the GitHub API at view time.
          ISSUE_OBJ='null'
          if [ -n "$ISSUE" ]; then
            ISSUE_JSON=$(gh issue view "$ISSUE" --repo "$REPO" --json title,body 2>/dev/null || echo '{}')
            TITLE=$(printf '%s' "$ISSUE_JSON" | jq -r '.title // ""')
            BODY=$(printf  '%s' "$ISSUE_JSON" | jq -r '.body  // ""')
            ISSUE_OBJ=$(jq -n \
              --arg n "$ISSUE" --arg t "$TITLE" --arg b "$BODY" \
              --arg url "https://github.com/$REPO/issues/$ISSUE" \
              '{number: ($n|tonumber), title: $t, url: $url, body: $b}')
          fi

          # Schema must match `qa-build.yml`'s entry shape — the
          # dashboard at public/qa/index.html in onym-website renders
          # both kinds with the same fields.
          jq -n \
            --arg platform "android" \
            --arg version "$VERSION" \
            --arg kind "tag" \
            --arg tag "$TAG" \
            --arg commit "$COMMIT" \
            --arg commit_short "$COMMIT_SHORT" \
            --arg built_at "$BUILT_AT" \
            --arg description "Release ${VERSION}" \
            --argjson issue "$ISSUE_OBJ" \
            --arg install_url "https://${HOST}/qa/android/${VERSION}/onym.apk" \
            --arg apk_url     "https://${HOST}/qa/android/${VERSION}/onym.apk" \
            --argjson size_bytes "${APK_SIZE}" \
            --arg commit_url   "https://github.com/$REPO/commit/$COMMIT" \
            --arg workflow_url "https://github.com/$REPO/actions/runs/$RUN_ID" \
            '{
              platform: $platform,
              version: $version,
              kind: $kind,
              branch: null,
              tag: $tag,
              commit: $commit,
              commit_short: $commit_short,
              built_at: $built_at,
              description: $description,
              issue: $issue,
              install_url: $install_url,
              apk_url: $apk_url,
              size_bytes: $size_bytes,
              commit_url: $commit_url,
              workflow_url: $workflow_url
            }' > /tmp/new-entry.json

          echo "::group::New dashboard entry"
          cat /tmp/new-entry.json
          echo "::endgroup::"

          # Fetch the live builds.json. 404 (no file yet) -> empty skeleton.
          if curl -sf -o /tmp/current.json "https://${HOST}/qa/builds.json"; then
            echo "::notice::Fetched current builds.json from https://${HOST}/qa/builds.json"
          else
            echo "::notice::No existing builds.json -- starting fresh"
            echo '{"schema_version":1,"builds":[]}' > /tmp/current.json
          fi

          # Merge: drop scaffold sample, prepend our entry, dedupe by
          # platform+version (newer wins — re-running a release for
          # the same tag overwrites the dashboard entry with this
          # run's metadata), sort newest first, cap 50.
          jq --slurpfile new /tmp/new-entry.json '
            (if .is_sample == true then .builds = [] else . end)
            | .builds = (
                [$new[0]] + (.builds // [])
                | unique_by(.platform + "@" + .version)
                | sort_by(.built_at) | reverse
                | .[0:50]
              )
            | del(.is_sample)
            | .schema_version = 1
            | .generated_at = (now | todate)
          ' /tmp/current.json > dist/qa/builds.json

          echo "::group::Merged builds.json (head)"
          jq '{schema_version, generated_at, total: (.builds|length), builds: (.builds[0:5])}' dist/qa/builds.json
          echo "::endgroup::"

      - name: Publish to onym.app/qa/
        # delete_stale: false preserves iOS uploads under
        # /var/www/onym/qa/ios/ and previous Android builds under
        # /var/www/onym/qa/android/<other>/.
        uses: onymchat/onym-website/.github/actions/deploy@main
        with:
          source_path: dist/qa
          target_subpath: qa
          ssh_key: ${{ secrets.DEPLOY_SSH_KEY }}
          host: ${{ secrets.DEPLOY_HOST }}
          delete_stale: false

      - name: QA-publish summary
        env:
          VERSION: ${{ inputs.tag }}
          HOST:    ${{ secrets.DEPLOY_HOST }}
        run: |
          {
            echo "## QA build published (alongside GitHub Release \`$VERSION\`)"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | \`$VERSION\` |"
            echo "| APK | https://${HOST}/qa/android/${VERSION}/onym.apk |"
            echo "| Build details | https://${HOST}/qa/build/?platform=android&version=${VERSION} |"
            echo "| Dashboard | https://${HOST}/qa/?platform=android |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment QA install URL on the linked release issue
        # Best-effort: gh failure must not fail the release run.
        if: success() && inputs.issue_number != ''
        env:
          ISSUE:    ${{ inputs.issue_number }}
          VERSION:  ${{ inputs.tag }}
          HOST:     ${{ secrets.DEPLOY_HOST }}
          REPO:     ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" <<MSG
          QA build \`${VERSION}\` published to the dashboard.

          - Install on Android: https://${HOST}/qa/android/${VERSION}/onym.apk
          - Build details (test plan, install, metadata): https://${HOST}/qa/build/?platform=android&version=${VERSION}
          MSG
          if ! gh issue comment "$ISSUE" --repo "$REPO" --body-file "$BODY_FILE"; then
            echo "::warning::Failed to post QA-install comment on issue #$ISSUE (release itself succeeded)."
          fi
          rm -f "$BODY_FILE"

  # ─── Release-issue reporting ─────────────────────────────────────
  # Only runs when dispatched from `release-from-issue.yml` (which
  # passes the issue number). Ticks UI_TESTS checkboxes for passing
  # test classes; on any failure, posts an aggregated comment with
  # stack-trace excerpts. `if: always()` so failed runs still report.

  report-to-issue:
    name: Report test results to release issue
    needs: [android-test]
    if: always() && inputs.issue_number != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        # No `lfs: true` — only need scripts/release_issue.py.

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: connectedAndroidTest-report
          path: artifact

      - name: Update UI_TESTS checkboxes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          BODY=$(gh issue view ${{ inputs.issue_number }} \
            --repo ${{ github.repository }} --json body --jq .body)
          NEW_BODY=$(printf '%s' "$BODY" | python3 scripts/release_issue.py tick \
            --results artifact/outputs/androidTest-results)
          # Idempotent: re-runs of the same Release dispatch overwrite
          # the section in full.
          printf '%s' "$NEW_BODY" | gh issue edit ${{ inputs.issue_number }} \
            --repo ${{ github.repository }} --body-file -

      - name: Post failure comment if any tests failed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python3 scripts/release_issue.py comment \
            --results artifact/outputs/androidTest-results \
            --run-url "$RUN_URL" > /tmp/comment.md
          if [ -s /tmp/comment.md ]; then
            gh issue comment ${{ inputs.issue_number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/comment.md
          else
            echo "All test classes green — no failure comment to post."
          fi
